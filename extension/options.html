<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>prompt-library — options</title>
  <style>
    :root { --bg:#0a0a0a; --bg-1:#101010; --border:#2a2a2a; --text:#e6e6e6; --dim:#9a9a9a; --accent:#00ff88; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 32px;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
    }
    h1 { font-family: "JetBrains Mono", ui-monospace, monospace; color: var(--accent); font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--dim); font-size: 12px; margin-bottom: 24px; }
    h2 { font-size: 14px; margin: 24px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    textarea {
      width: 100%; height: 260px;
      background: var(--bg-1); color: var(--text);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 10px; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12px;
    }
    button {
      background: var(--accent); color: #000; border: 0;
      padding: 6px 12px; border-radius: 2px; font-weight: 700; cursor: pointer; margin-right: 8px;
    }
    button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); font-weight: 400; }
    .row { margin-top: 8px; }
    .hint { color: var(--dim); font-size: 12px; margin-top: 4px; }
    #status { color: var(--accent); font-size: 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>prompt-library <span style="color:var(--dim);font-weight:400;">— options</span></h1>
  <div class="sub">v0 — insert only, local items stored in chrome.storage.sync.</div>

  <h2>Triggers</h2>
  <p class="hint">
    Type <code>//</code> in any text field, or press <code>Ctrl+Shift+P</code>
    (<code>⌘+Shift+P</code> on mac) to open the picker.
  </p>

  <h2>Export / import</h2>
  <p class="hint">Back up your items or move them between browsers.</p>
  <textarea id="json" spellcheck="false"></textarea>
  <div class="row">
    <button id="load">load from storage</button>
    <button id="save" class="secondary">save to storage</button>
    <span id="status"></span>
  </div>

  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
