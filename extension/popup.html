<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>prompt-library</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-1: #101010;
      --bg-2: #161616;
      --border: #2a2a2a;
      --text: #e6e6e6;
      --text-dim: #9a9a9a;
      --accent: #00ff88;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 360px;
      max-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    header .title { font-family: "JetBrains Mono", ui-monospace, monospace; font-weight: 700; color: var(--accent); }
    header .title .sub { color: var(--text-dim); font-weight: 400; margin-left: 6px; }
    header a { color: var(--text-dim); text-decoration: none; font-size: 11px; }
    header a:hover { color: var(--text); }
    .bar { padding: 8px 12px; display: flex; gap: 6px; }
    .bar input {
      flex: 1;
      background: var(--bg-1);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 2px;
      font: inherit;
    }
    .bar input:focus { outline: 1px solid var(--accent); }
    .bar button {
      background: var(--accent);
      color: #000;
      border: 0;
      padding: 6px 10px;
      border-radius: 2px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .list { max-height: 360px; overflow-y: auto; padding: 0 6px 10px; }
    .item {
      background: var(--bg-1);
      border: 1px solid var(--border);
      padding: 8px 10px;
      margin: 6px;
      border-radius: 2px;
      cursor: pointer;
    }
    .item:hover { border-color: var(--accent); }
    .item .t { font-weight: 600; margin-bottom: 2px; }
    .item .b { color: var(--text-dim); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .actions { display: flex; gap: 8px; margin-top: 6px; }
    .item .actions button {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 2px;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .item .actions button:hover { color: var(--text); border-color: var(--text-dim); }
    .empty { text-align: center; color: var(--text-dim); padding: 24px 12px; font-size: 12px; }
    dialog {
      background: var(--bg-1);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px;
      width: 320px;
    }
    dialog::backdrop { background: rgba(0,0,0,0.6); }
    dialog input, dialog textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 2px;
      font: inherit;
      margin-bottom: 8px;
    }
    dialog textarea { min-height: 120px; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12px; }
    dialog .row { display: flex; justify-content: flex-end; gap: 8px; }
    dialog button {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 2px;
      font: inherit;
      cursor: pointer;
    }
    dialog button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <div class="title">prompt-library<span class="sub">v0</span></div>
    <a id="open-options" href="#">options</a>
  </header>
  <div class="bar">
    <input id="q" type="text" placeholder="search items…" />
    <button id="new">+ new</button>
  </div>
  <div id="list" class="list"></div>

  <dialog id="editor">
    <input id="e-title" type="text" placeholder="title" />
    <textarea id="e-body" placeholder="body (markdown ok)"></textarea>
    <input id="e-tags" type="text" placeholder="tags (comma separated)" />
    <div class="row">
      <button id="e-cancel">cancel</button>
      <button id="e-save" class="primary">save</button>
    </div>
  </dialog>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
