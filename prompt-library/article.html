<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>prompt-library &middot; article</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("pl_theme") || "dark");</script>
  <style>
    .article-wrap {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 18px 80px;
    }
    .article-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .article-meta .read-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
    }
    .article-wrap h1 {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 14px;
      letter-spacing: -0.01em;
    }
    @media (min-width: 720px) { .article-wrap h1 { font-size: 36px; } }
    .article-wrap .summary {
      font-size: 17px;
      color: var(--text-dim);
      margin: 0 0 32px;
      padding-bottom: 28px;
      border-bottom: 1px dashed var(--border-2);
    }
    .article-body { line-height: 1.75; font-size: 15.5px; }
    .article-body p {
      margin: 0 0 18px;
      color: var(--text);
    }
    .article-body h3 {
      font-family: var(--mono);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 36px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .article-body h3::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 1px;
      background: var(--accent);
    }
    .article-body ul {
      margin: 0 0 18px;
      padding-left: 0;
      list-style: none;
    }
    .article-body ul li {
      color: var(--text);
      padding: 6px 0 6px 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .article-body ul li:last-child { border-bottom: 0; }
    .article-body ul li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-family: var(--mono);
    }
    .example-block {
      background: #050505;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 0 0 18px;
      position: relative;
    }
    .example-block .example-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      padding: 8px 14px 0;
    }
    .example-block .ex-copy {
      position: absolute;
      top: 8px;
      right: 10px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-edge);
      padding: 4px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.12s ease;
      line-height: 1;
    }
    .example-block .ex-copy:hover { background: var(--accent); color: var(--bg); }
    .example-block .ex-copy.copied { background: var(--accent); color: var(--bg); }
    .example-block pre {
      margin: 0;
      padding: 10px 14px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: #d0e8d0;
    }
    .callout {
      background: var(--accent-soft);
      border: 1px solid var(--accent-edge);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 0 0 18px;
      font-size: 14.5px;
      color: var(--text);
      line-height: 1.6;
    }
    .article-nav {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .article-nav a {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .article-nav a:hover { color: var(--accent); }
    .reference-block {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 0 0 18px;
    }
    .reference-block .ref-icon {
      font-family: var(--mono);
      font-size: 18px;
      color: var(--accent);
      flex-shrink: 0;
      line-height: 1;
    }
    .reference-block .ref-body { flex: 1; min-width: 0; }
    .reference-block .ref-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 4px;
    }
    .reference-block .ref-title {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }
    .reference-block a.ref-link {
      display: inline-block;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .reference-block a.ref-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="site-nav" data-active="methodology" data-sub="learn">
    <div class="count-pill" id="read-time-pill" style="display:none;">
      <span class="num" id="read-time-val"></span>
      <span class="label">read</span>
    </div>
  </div>

  <section class="hero" style="padding-bottom:24px;">
    <div class="eyebrow">
      <span class="dot"></span>
      <a href="learn.html" style="color:var(--text-dim); text-decoration:none;">&larr; back to articles</a>
    </div>
  </section>

  <div class="article-wrap">
    <div id="article-root">
      <div class="empty">
        <strong>Article not found</strong>
        <a href="learn.html">Back to articles</a>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="articles.js"></script>
  <script src="bookmarks.js"></script>
  <script src="ratings.js"></script>
  <script src="nav.js"></script>
  <script src="footer.js"></script>
  <script src="theme.js"></script>
  <script defer src="shortcuts.js"></script>
  <script>
    (function () {
      "use strict";

      const params = new URLSearchParams(window.location.search);
      const id     = parseInt(params.get("id"), 10);
      const $root  = document.getElementById("article-root");

      if (!id || typeof ARTICLES === "undefined") return;

      const article = ARTICLES.find((a) => a.id === id);
      if (!article) return;

      document.title = "prompt-library \u00b7 " + article.title;
      document.getElementById("nav-sub").textContent = article.title;

      const pill = document.getElementById("read-time-pill");
      const pillVal = document.getElementById("read-time-val");
      pillVal.textContent = article.readTime;
      pill.style.display = "";

      const tagsHtml = (article.tags || []).map((t) =>
        '<span class="tag">#' + escapeHtml(t) + "</span>"
      ).join(" ");

      const authorHtml = article.author
        ? '<a href="user.html?handle=' + encodeURIComponent(article.author) + '" style="color:var(--accent);font-family:var(--mono);font-size:11px;text-decoration:none;">' + escapeHtml(article.author) + '</a>'
        : "";

      const BM_OUTLINE = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true"><path d="M3 2h10v13l-5-3-5 3V2z"/></svg>';
      const BM_FILLED  = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3 2h10v13l-5-3-5 3V2z"/></svg>';
      const isSaved = window.PL_BOOKMARKS && window.PL_BOOKMARKS.isBookmarked("article", article.id);
      const bmHtml =
        '<button type="button" class="bookmark-btn article-bm' + (isSaved ? " saved" : "") + '" ' +
          'id="article-bookmark" aria-label="Save ' + escapeHtml(article.title) + '" ' +
          'aria-pressed="' + (isSaved ? "true" : "false") + '" ' +
          'style="margin-left:auto;">' +
          (isSaved ? BM_FILLED : BM_OUTLINE) +
        '</button>';

      let html =
        '<div class="article-meta">' +
          '<span class="card-cat">article</span>' +
          (tagsHtml ? tagsHtml : "") +
          '<span class="read-time">' + escapeHtml(article.readTime) + " read</span>" +
          (authorHtml ? authorHtml : "") +
          bmHtml +
        "</div>" +
        "<h1>" + escapeHtml(article.title) + "</h1>" +
        '<p class="summary">' + escapeHtml(article.summary) + "</p>" +
        '<div class="article-body">' + renderBody(article.body) + "</div>" +
        '<div class="section-divider"><span>rating</span><hr /></div>' +
        '<div class="rating-widget">' +
          '<div class="rating-stars" id="rating-stars" role="group" aria-label="Rate this article"></div>' +
          '<span class="rating-count" id="rating-count">not yet rated</span>' +
        '</div>' +
        '<div class="section-divider"><span>comments</span><hr /></div>' +
        '<div class="comments-section">' +
          '<div class="comment-list" id="comment-list">' +
            '<div class="comments-empty" id="comments-empty">No comments yet. Be the first.</div>' +
          '</div>' +
          '<div class="comment-input-row">' +
            '<input class="comment-input" id="comment-input" type="text" placeholder="Leave a note…" maxlength="280" />' +
            '<button class="comment-submit" id="comment-submit" type="button">post</button>' +
          '</div>' +
        '</div>';

      // Prev / next navigation
      const idx  = ARTICLES.findIndex((a) => a.id === id);
      const prev = ARTICLES[idx - 1];
      const next = ARTICLES[idx + 1];
      html += '<div class="article-nav">';
      html += prev
        ? '<a href="article.html?id=' + prev.id + '">&larr; ' + escapeHtml(prev.title) + "</a>"
        : "<span></span>";
      html += next
        ? '<a href="article.html?id=' + next.id + '">' + escapeHtml(next.title) + " &rarr;</a>"
        : "<span></span>";
      html += "</div>";

      $root.innerHTML = html;

      if (window.PL_RATINGS) window.PL_RATINGS.mount({ type: "article", id: article.id });

      // Wire article bookmark
      const $bm = document.getElementById("article-bookmark");
      if ($bm && window.PL_BOOKMARKS) {
        $bm.addEventListener("click", (e) => {
          e.preventDefault();
          const nowSaved = window.PL_BOOKMARKS.toggle("article", article.id);
          $bm.innerHTML = nowSaved ? BM_FILLED : BM_OUTLINE;
          $bm.classList.toggle("saved", nowSaved);
          $bm.setAttribute("aria-pressed", nowSaved ? "true" : "false");
        });
      }

      // Wire copy buttons on example blocks
      $root.querySelectorAll(".example-block").forEach((block) => {
        const btn = block.querySelector(".ex-copy");
        const pre = block.querySelector("pre");
        if (!btn || !pre) return;
        btn.addEventListener("click", async () => {
          await copyToClipboard(pre.textContent);
          btn.textContent = "copied";
          btn.classList.add("copied");
          setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1500);
        });
      });

      function renderBody(blocks) {
        return (blocks || []).map((b) => {
          if (b.type === "p") {
            return "<p>" + escapeHtml(b.text) + "</p>";
          }
          if (b.type === "h3") {
            return "<h3>" + escapeHtml(b.text) + "</h3>";
          }
          if (b.type === "example") {
            return '<div class="example-block">' +
              '<div class="example-label">' + escapeHtml(b.label || "example") + "</div>" +
              '<button class="ex-copy" type="button">copy</button>' +
              "<pre>" + escapeHtml(b.text) + "</pre>" +
              "</div>";
          }
          if (b.type === "callout") {
            return '<div class="callout">' + escapeHtml(b.text) + "</div>";
          }
          if (b.type === "reference") {
            return '<div class="reference-block">' +
              '<div class="ref-icon">&#9646;</div>' +
              '<div class="ref-body">' +
                '<div class="ref-label">source</div>' +
                '<div class="ref-title">' + escapeHtml(b.title) + "</div>" +
                (b.url ? '<a class="ref-link" href="' + escapeHtml(b.url) + '" target="_blank" rel="noopener">view on Amazon &rarr;</a>' : "") +
              "</div>" +
            "</div>";
          }
          if (b.type === "list") {
            const items = (b.items || []).map((i) => "<li>" + escapeHtml(i) + "</li>").join("");
            return "<ul>" + items + "</ul>";
          }
          return "";
        }).join("");
      }

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta);
        }
      }

      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
    })();
  </script>

</body>
</html>
