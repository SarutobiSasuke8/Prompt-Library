<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>prompt-library &middot; article</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("pl_theme") || "dark");</script>
  <style>
    .article-wrap {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 18px 80px;
    }
    .article-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .article-meta .read-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
    }
    .article-wrap h1 {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 14px;
      letter-spacing: -0.01em;
    }
    @media (min-width: 720px) { .article-wrap h1 { font-size: 36px; } }
    .article-wrap .summary {
      font-size: 17px;
      color: var(--text-dim);
      margin: 0 0 32px;
      padding-bottom: 28px;
      border-bottom: 1px dashed var(--border-2);
    }
    .article-body { line-height: 1.75; font-size: 15.5px; }
    .article-body p {
      margin: 0 0 18px;
      color: var(--text);
    }
    .article-body h3 {
      font-family: var(--mono);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 36px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .article-body h3::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 1px;
      background: var(--accent);
    }
    .article-body ul {
      margin: 0 0 18px;
      padding-left: 0;
      list-style: none;
    }
    .article-body ul li {
      color: var(--text);
      padding: 6px 0 6px 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .article-body ul li:last-child { border-bottom: 0; }
    .article-body ul li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-family: var(--mono);
    }
    .example-block {
      background: #050505;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 0 0 18px;
      position: relative;
    }
    .example-block .example-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      padding: 8px 14px 0;
    }
    .example-block .ex-copy {
      position: absolute;
      top: 8px;
      right: 10px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-edge);
      padding: 4px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.12s ease;
      line-height: 1;
    }
    .example-block .ex-copy:hover { background: var(--accent); color: var(--bg); }
    .example-block .ex-copy.copied { background: var(--accent); color: var(--bg); }
    .example-block pre {
      margin: 0;
      padding: 10px 14px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      color: #d0e8d0;
    }
    .callout {
      background: var(--accent-soft);
      border: 1px solid var(--accent-edge);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 0 0 18px;
      font-size: 14.5px;
      color: var(--text);
      line-height: 1.6;
    }
    .article-nav {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .article-nav a {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .article-nav a:hover { color: var(--accent); }
    .reference-block {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin: 0 0 18px;
    }
    .reference-block .ref-icon {
      font-family: var(--mono);
      font-size: 18px;
      color: var(--accent);
      flex-shrink: 0;
      line-height: 1;
    }
    .reference-block .ref-body { flex: 1; min-width: 0; }
    .reference-block .ref-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 4px;
    }
    .reference-block .ref-title {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }
    .reference-block a.ref-link {
      display: inline-block;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .reference-block a.ref-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <a class="logo" href="index.html" style="text-decoration:none; color:inherit;">
        <span class="caret">&gt;</span>prompt-library
        <span class="tilde">~</span>
        <span class="sub" id="header-sub">learn</span>
      </a>
      <nav style="display:flex; align-items:center; gap:18px; font-family:var(--mono); font-size:12px;">
        <a href="index.html" style="color:var(--text-dim); text-decoration:none;">library</a>
        <a href="learn.html" style="color:var(--accent); text-decoration:none;">methodology</a>
        <a href="collections.html" style="color:var(--text-dim); text-decoration:none;">collections</a>
        <a href="tools.html" style="color:var(--text-dim); text-decoration:none;">tools</a>
        <a href="about.html" style="color:var(--text-dim); text-decoration:none;">about</a>
      </nav>
      <div class="count-pill" id="read-time-pill" style="display:none;">
        <span class="num" id="read-time-val"></span>
        <span class="label">read</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀</button>
      <a href="user.html?handle=SarutobiSasuke" class="avatar-chip" aria-label="Your profile">
        <span class="av-circle">S</span>
        <span class="av-handle">SarutobiSasuke</span>
      </a>
    </div>
  </header>

  <section class="hero" style="padding-bottom:24px;">
    <div class="eyebrow">
      <span class="dot"></span>
      <a href="learn.html" style="color:var(--text-dim); text-decoration:none;">&larr; back to methodology</a>
    </div>
  </section>

  <div class="article-wrap">
    <div id="article-root">
      <div class="empty">
        <strong>Article not found</strong>
        <a href="learn.html">Back to methodology</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="inner">
      <div>&gt; built for people shipping with AI</div>
      <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
        <a href="index.html">library</a>
        <a href="learn.html">methodology</a>
        <a href="tools.html">tools</a>
        <a href="playground.html">playground</a>
        <a href="privacy.html">privacy</a>
        <span style="color:var(--border-2);">|</span>
        <a href="https://github.com/SarutobiSasuke8/Prompt-Library" target="_blank" rel="noopener">github</a>
        <a class="cta social-x" href="#" target="_blank" rel="noopener" aria-label="Follow on X">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="vertical-align:-2px; margin-right:6px;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          follow on X
        </a>
        <a class="cta" href="https://github.com/SarutobiSasuke8/Prompt-Library/blob/main/prompt-library/CONTRIBUTING.md" target="_blank" rel="noopener">contribute a prompt</a>
      </div>

  <script src="articles.js"></script>
  <script src="theme.js"></script>
  <script>
    (function () {
      "use strict";

      const params = new URLSearchParams(window.location.search);
      const id     = parseInt(params.get("id"), 10);
      const $root  = document.getElementById("article-root");

      if (!id || typeof ARTICLES === "undefined") return;

      const article = ARTICLES.find((a) => a.id === id);
      if (!article) return;

      document.title = "prompt-library \u00b7 " + article.title;
      document.getElementById("header-sub").textContent = article.title;

      const pill = document.getElementById("read-time-pill");
      const pillVal = document.getElementById("read-time-val");
      pillVal.textContent = article.readTime;
      pill.style.display = "";

      const tagsHtml = (article.tags || []).map((t) =>
        '<span class="tag">#' + escapeHtml(t) + "</span>"
      ).join(" ");

      const authorHtml = article.author
        ? '<a href="user.html?handle=' + encodeURIComponent(article.author) + '" style="color:var(--accent);font-family:var(--mono);font-size:11px;text-decoration:none;">' + escapeHtml(article.author) + '</a>'
        : "";

      let html =
        '<div class="article-meta">' +
          '<span class="card-cat">methodology</span>' +
          (tagsHtml ? tagsHtml : "") +
          '<span class="read-time">' + escapeHtml(article.readTime) + " read</span>" +
          (authorHtml ? authorHtml : "") +
        "</div>" +
        "<h1>" + escapeHtml(article.title) + "</h1>" +
        '<p class="summary">' + escapeHtml(article.summary) + "</p>" +
        '<div class="article-body">' + renderBody(article.body) + "</div>";

      // Prev / next navigation
      const idx  = ARTICLES.findIndex((a) => a.id === id);
      const prev = ARTICLES[idx - 1];
      const next = ARTICLES[idx + 1];
      html += '<div class="article-nav">';
      html += prev
        ? '<a href="article.html?id=' + prev.id + '">&larr; ' + escapeHtml(prev.title) + "</a>"
        : "<span></span>";
      html += next
        ? '<a href="article.html?id=' + next.id + '">' + escapeHtml(next.title) + " &rarr;</a>"
        : "<span></span>";
      html += "</div>";

      $root.innerHTML = html;

      // Wire copy buttons on example blocks
      $root.querySelectorAll(".example-block").forEach((block) => {
        const btn = block.querySelector(".ex-copy");
        const pre = block.querySelector("pre");
        if (!btn || !pre) return;
        btn.addEventListener("click", async () => {
          await copyToClipboard(pre.textContent);
          btn.textContent = "copied";
          btn.classList.add("copied");
          setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("copied"); }, 1500);
        });
      });

      function renderBody(blocks) {
        return (blocks || []).map((b) => {
          if (b.type === "p") {
            return "<p>" + escapeHtml(b.text) + "</p>";
          }
          if (b.type === "h3") {
            return "<h3>" + escapeHtml(b.text) + "</h3>";
          }
          if (b.type === "example") {
            return '<div class="example-block">' +
              '<div class="example-label">' + escapeHtml(b.label || "example") + "</div>" +
              '<button class="ex-copy" type="button">copy</button>' +
              "<pre>" + escapeHtml(b.text) + "</pre>" +
              "</div>";
          }
          if (b.type === "callout") {
            return '<div class="callout">' + escapeHtml(b.text) + "</div>";
          }
          if (b.type === "reference") {
            return '<div class="reference-block">' +
              '<div class="ref-icon">&#9646;</div>' +
              '<div class="ref-body">' +
                '<div class="ref-label">source</div>' +
                '<div class="ref-title">' + escapeHtml(b.title) + "</div>" +
                (b.url ? '<a class="ref-link" href="' + escapeHtml(b.url) + '" target="_blank" rel="noopener">view on Amazon &rarr;</a>' : "") +
              "</div>" +
            "</div>";
          }
          if (b.type === "list") {
            const items = (b.items || []).map((i) => "<li>" + escapeHtml(i) + "</li>").join("");
            return "<ul>" + items + "</ul>";
          }
          return "";
        }).join("");
      }

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta);
        }
      }

      function escapeHtml(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
    })();
  </script>

</body>
</html>
